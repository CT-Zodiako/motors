<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <i class="pi pi-link"></i>
      <h1>Odoo Bridge</h1>
      <p>Iniciá sesión para continuar</p>
    </div>

    <form class="login-form" (ngSubmit)="onSubmit()">
      <div class="field">
        <label for="email">Email</label>
        <input
          id="email"
          pInputText
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="Tu email"
          autocomplete="email"
        />
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input
          id="password"
          pInputText
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••"
          autocomplete="current-password"
        />
      </div>

      <div class="login-actions">
        <p-button
          type="submit"
          label="Ingresar"
          icon="pi pi-sign-in"
          [loading]="loading()"
          styleClass="w-full"
        />
      </div>
    </form>

    </div>
</div>
