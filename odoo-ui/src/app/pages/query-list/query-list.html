<div class="page">
  <div class="page-header">
    <h1>Queries registrados</h1>
    <p-button label="Actualizar" icon="pi pi-refresh" severity="secondary" (onClick)="load()" />
  </div>

  <p-table
    [value]="sortedQueries()"
    [loading]="loading()"
    [paginator]="true"
    [rows]="10"
    [rowsPerPageOptions]="[10, 25, 50]"
    [globalFilterFields]="['name', 'description', 'model', 'category.name']"
    groupRowsBy="category.name"
    rowGroupMode="subheader"
    styleClass="p-datatable-striped p-datatable-gridlines"
    #dt
  >
    <ng-template #caption>
      <div class="table-caption">
        <span class="p-input-icon-left">
          <i class="pi pi-search"></i>
          <input pInputText type="text" placeholder="Buscar..." (input)="dt.filterGlobal(($any($event.target)).value, 'contains')" />
        </span>
        <p-tag [value]="queries().length + ' queries'" severity="secondary" />
      </div>
    </ng-template>

    <ng-template #groupheader let-row>
      <tr class="category-group-row">
        <td colspan="8">
          <span class="category-group-label">{{ row.category?.name ?? 'Sin categoría' }}</span>
          <p-tag [value]="row.category ? '' : 'sin asignar'" severity="secondary" />
        </td>
      </tr>
    </ng-template>

    <ng-template #header>
      <tr>
        <th pSortableColumn="name">Nombre <p-sortIcon field="name" /></th>
        <th>Descripción</th>
        <th pSortableColumn="model">Modelo <p-sortIcon field="model" /></th>
        <th>Método</th>
        <th pSortableColumn="limit_val">Límite <p-sortIcon field="limit_val" /></th>
        <th>Categoría</th>
        <th>Estado</th>
        <th></th>
      </tr>
    </ng-template>

    <ng-template #body let-q>
      <tr>
        <td><code>{{ q.name }}</code></td>
        <td class="desc">{{ q.description }}</td>
        <td><code>{{ q.model }}</code></td>
        <td>{{ q.method }}</td>
        <td>{{ q.limit_val }}</td>
        <td>
          <p-select
            [options]="categories()"
            [ngModel]="q.category?.id"
            (ngModelChange)="onCategoryChange(q, $event)"
            optionLabel="name"
            optionValue="id"
            size="small"
            appendTo="body"
            styleClass="category-cell-select"
          />
        </td>
        <td>
          <p-tag
            [value]="q.active ? 'Activo' : 'Inactivo'"
            [severity]="q.active ? 'success' : 'danger'"
          />
        </td>
        <td>
          @if (q.active) {
            <div class="flex gap-2">
              <p-button
                label="Editar"
                severity="info"
                size="small"
                [outlined]="true"
                (onClick)="editQuery(q)"
              />
              <p-button
                label="Desactivar"
                severity="danger"
                size="small"
                [outlined]="true"
                (onClick)="deactivate(q.name)"
              />
            </div>
          }
        </td>
      </tr>
    </ng-template>

    <ng-template #emptymessage>
      <tr>
        <td colspan="8" class="empty-msg">No hay queries registrados.</td>
      </tr>
    </ng-template>
  </p-table>
</div>
