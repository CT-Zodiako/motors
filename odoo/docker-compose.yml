version: '3.9'

services:
  postgres:
    image: postgres:17
    container_name: postgres17
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: mi_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - postgres_network

volumes:
  postgres_data:

networks:
  postgres_network:

# odoo project db: odoo_db (postgres:17 / user: postgres / port: 5432)
